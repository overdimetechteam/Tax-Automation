services:
  - type: web
    name: tax-automation-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://tax-automation-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
